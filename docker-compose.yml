services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: angular_frontend
    ports:
      - "${APP_PORT}:80"
    depends_on:
      - api
  api:
    image: clue/json-server
    container_name: mock_api
    ports:
      - "${API_PORT:-3001}:80"
    volumes:
      - ./mock-api:/data
   
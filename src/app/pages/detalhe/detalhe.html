<div class="card" *ngIf="processo as p; else naoEncontrado">
  <div class="header">
    <div>
      <h2>Detalhe do Processo</h2>
    </div>
    <div class="actions">
      <a class="btn editar" [routerLink]="['/editar', p.id]">Editar</a>
      <a class="btn" routerLink="/lista">Voltar</a>
    </div>
  </div>

  <div class="grid">
    <div><strong>Número:</strong> {{ p.numero }}</div>
    <div><strong>Cliente:</strong> {{ p.cliente }}</div>
    <div><strong>Tipo:</strong> {{ p.tipo }}</div>
    <div><strong>Status:</strong> <app-status-badge [status]="p.status"></app-status-badge></div>
    <div><strong>Descrição:</strong> {{ p.descricao }}</div>
  </div>
</div>

<ng-template #naoEncontrado>
  <div class="card">
    <h2>Processo não encontrado</h2>
    <a class="btn" routerLink="/lista">Voltar</a>
  </div>
</ng-template>

<!--Esse código é o template Angular da página de detalhes de um processo.

Fluxo de funcionamento:

1️⃣ O Angular verifica se existe um processo
2️⃣ Se existir:

mostra os detalhes do processo

número

cliente

tipo

status

descrição

botões de editar e voltar

3️⃣ Se não existir:

mostra a mensagem “Processo não encontrado”

botão para voltar para a lista

✅ Principais conceitos Angular usados nesse código

*ngIf → mostrar ou esconder conteúdo

{{ }} → interpolação de dados

[routerLink] → navegação entre páginas

componentes → <app-status-badge>

ng-template → conteúdo alternativo-->
